{% extends "layout.html" %}
{% block content %}

<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full max-w-sm p-8">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-napoli-500 rounded-xl mb-3">
                <i class="fa-solid fa-lock text-white text-lg"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-900 font-mono">Admin Login</h1>
            <p class="text-sm text-gray-400 mt-1">Napwnli AD Gameserver</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-2.5 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
            <input type="password" name="password" required autofocus
                placeholder="Enter admin password"
                class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-napoli-400 mb-4">
            <button type="submit"
                class="w-full bg-napoli-500 hover:bg-napoli-600 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
                <i class="fa-solid fa-right-to-bracket mr-2"></i>Sign in
            </button>
        </form>
    </div>
</div>

{% endblock %}
