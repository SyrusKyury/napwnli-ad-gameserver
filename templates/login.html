{% extends "layout.html" %}
{% block content %}

<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="rounded-xl border border-gray-800 p-8" style="background: #111827;">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-napoli-500/20 border border-napoli-500/30 rounded-xl mb-4">
                    <i class="fa-solid fa-lock text-napoli-400 text-lg"></i>
                </div>
                <h1 class="text-xl font-bold text-white font-mono">Admin Login</h1>
                <p class="text-sm text-gray-500 mt-1">Napwnli AD Gameserver</p>
            </div>

            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <label class="block text-sm font-semibold text-gray-300 mb-1.5">Password</label>
                <input type="password" name="password" required autofocus
                    placeholder="Enter admin password"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-napoli-500/40 focus:border-napoli-500 mb-4">
                <button type="submit"
                    class="w-full bg-napoli-500 hover:bg-napoli-600 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i>Sign in
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
